<!DOCTYPE html>
<html>

<head>
    <title>AUTOMOVILES KIA</title>
</head>

<body>
    <h1>AUTOMOVILES KIA</h1>

    <form id="formulario">
        <label for="Nombre">Nombre:</label>
        <input type="text" id="Nombre" required><br><br>

        <label for="Edad">Edad:</label>
        <input type="number" id="Edad" required><br><br>

        <label for="fechaIngreso">Fecha de ingreso:</label>
        <input type="date" id="fechaIngreso" required><br><br>

        <label for="genero">Género:</label>
        <select id="genero" required>
            <option value="hombre">Hombre</option>
            <option value="mujer">Mujer</option>
            <option value="otros">Otros</option>
        </select>
        <input type="text" id="otroGenero" placeholder="Especifica tu género"
            style="display:none; margin-left:10px;"><br><br>

        <label for="Lista_de_verificacion">Lista de verificación de colores:</label>
        <select id="Lista_de_verificacion" required>
            <option value="Gris">Gris</option>
            <option value="Negro">Negro</option>
            <option value="Azul oscuro">Azul oscuro</option>
        </select><br><br>

        <button type="button" onclick="verificarEdadPorGenero()">Verificar</button>
    </form>

    <script>
        document.getElementById("genero").addEventListener("change", function () {
            var otroInput = document.getElementById("otroGenero");
            if (this.value === "otros") {
                otroInput.style.display = "inline-block";
                otroInput.required = true;
            } else {
                otroInput.style.display = "none";
                otroInput.required = false;
                otroInput.value = "";
            }
        });

        function verificarEdadPorGenero() {
            var Nombre = document.getElementById("Nombre").value;
            var Edad = parseInt(document.getElementById("Edad").value);
            var genero = document.getElementById("genero").value;
            if (genero === "otros") {
                var otroValor = document.getElementById("otroGenero").value.trim();
                if (otroValor === "") {
                    alert("Por favor, especifica tu género.");
                    return;
                }
                genero = otroValor;
            }
            var Lista_de_verificacion = document.getElementById("Lista_de_verificacion").value;

            if (genero === "hombre" && Edad > 18) {
                alert(Nombre + ", felicidades por tu moto nueva, color: " + Lista_de_verificacion);
            } else if (genero === "mujer" && Edad > 18) {
                alert(Nombre + ", Felicidades por tu auto nuevo, color: " + Lista_de_verificacion);
            } else {
                alert(Nombre + ", no es necesario comprar un auto nuevo.");
            }
        }
    </script>
</body>

</html>
