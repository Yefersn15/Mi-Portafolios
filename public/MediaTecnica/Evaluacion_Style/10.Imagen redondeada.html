<!DOCTYPE html>
<html>

<head>
    <title>Imagen redondeada</title>
    <style>
        img {
            max-width: 100%;
            height: auto;
            border-radius: 50%;
            display: block;
            margin: 0 auto;
            width: min(80%, 600px);
            aspect-ratio: 1/1;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <img src="Agua.jpg" alt="una ciudad en medio del Agua">
</body>

</html>
