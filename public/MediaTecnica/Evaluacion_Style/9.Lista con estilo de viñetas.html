<!DOCTYPE html>
<html>

<head>
    <title>Lista estilizada</title>
    <style>
        ul {
            list-style-type: none;
        }

        li:before {
            content: "⦿";
            color: red;
            font-weight: bold;
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <ul>
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ul>
</body>

</html>
