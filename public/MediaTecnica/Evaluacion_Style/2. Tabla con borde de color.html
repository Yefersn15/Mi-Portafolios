<!DOCTYPE html>
<html>

<head>
  <title>Mi tabla personalizada</title>
  <style>
    table {
      border-collapse: collapse
    }

    th,
    td {
      border: 1px solid orangered;
      padding: 8px;
    }

    th {
      background-color: lightblue;
    }

    td {
      background-color: lightgray;
    }
  </style>
</head>

<body>
  <h1>Mi tabla personalizada</h1>
  <table>
    <tr>
      <th>Nombre</th>
      <th>Edad</th>
    </tr>
    <tr>
      <td>Juan</td>
      <td>25</td>
    </tr>
    <tr>
      <td>María</td>
      <td>30</td>
    </tr>
  </table>
</body>

</html>
