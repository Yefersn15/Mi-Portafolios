<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos - Media Técnica y SENA</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow-y: auto;
        }

        .fila {
            display: flex;
            width: 100%;
        }

        .fila iframe {
            border: none;
            display: block;
        }

        .row-resizer {
            height: 6px;
            width: 100%;
            background: #ccc;
            cursor: row-resize;
        }

        .col-resizer {
            width: 6px;
            background: #ccc;
            cursor: col-resize;
            flex-shrink: 0;
        }

        .row-resizer:hover,
        .col-resizer:hover {
            background: #999;
        }
    </style>
</head>

<body>
    <div class="fila" id="fila1" style="height:230px;">
        <iframe src="Frames1_1.html" name="tecno" id="tecno" style="width:33%; height:100%;" scrolling="auto"></iframe>
        <div class="col-resizer" data-left="tecno" data-right="sisgem"></div>
        <iframe src="Frames1_2.html" name="sisgem" id="sisgem" style="width:33%; height:100%;"
            scrolling="auto"></iframe>
        <div class="col-resizer" data-left="sisgem" data-right="encomi"></div>
        <iframe src="Frames1_3.html" name="encomi" id="encomi" style="width:34%; height:100%;"
            scrolling="auto"></iframe>
    </div>
    <div class="row-resizer" data-top="fila1" data-bottom="fila2"></div>

    <div class="fila" id="fila2" style="height:395px;">
        <iframe src="Frames2.html" name="logos" style="width:100%; height:100%;" scrolling="auto"></iframe>
    </div>
    <div class="row-resizer" data-top="fila2" data-bottom="fila3"></div>

    <div class="fila" id="fila3" style="height:216px;">
        <iframe src="Frames4_1.html" name="intTecno" id="intTecno" style="width:33%; height:100%;"
            scrolling="auto"></iframe>
        <div class="col-resizer" data-left="intTecno" data-right="intSisgem"></div>
        <iframe src="Frames4_2.html" name="intSisgem" id="intSisgem" style="width:33%; height:100%;"
            scrolling="auto"></iframe>
        <div class="col-resizer" data-left="intSisgem" data-right="intEncomi"></div>
        <iframe src="Frames4_3.html" name="intEncomi" id="intEncomi" style="width:34%; height:100%;"
            scrolling="auto"></iframe>
    </div>
    <div class="row-resizer" data-top="fila3" data-bottom="fila4"></div>

    <div class="fila" id="fila4" style="height: 270px;">
        <iframe src="Frames3.html" name="video" style="width:100%; height:100%;" scrolling="auto"></iframe>
    </div>

    <script>
        function pxToPercent(px, total) {
            return (px / total) * 100;
        }

        function disableIframes() {
            document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = 'none');
        }

        function enableIframes() {
            document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = 'auto');
        }

        document.querySelectorAll('.col-resizer').forEach(resizer => {
            resizer.addEventListener('mousedown', function (e) {
                e.preventDefault();
                const left = document.getElementById(resizer.dataset.left);
                const right = document.getElementById(resizer.dataset.right);
                const container = resizer.parentElement;
                const containerWidth = container.offsetWidth;
                const startX = e.clientX;
                const startLeftWidth = left.offsetWidth;
                const startRightWidth = right.offsetWidth;
                disableIframes();

                function onMouseMove(e) {
                    const dx = e.clientX - startX;
                    let newLeftWidth = startLeftWidth + dx;
                    let newRightWidth = startRightWidth - dx;
                    if (newLeftWidth < 30 || newRightWidth < 30) return;
                    left.style.width = pxToPercent(newLeftWidth, containerWidth) + '%';
                    right.style.width = pxToPercent(newRightWidth, containerWidth) + '%';
                }

                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    enableIframes();
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        });

        document.querySelectorAll('.row-resizer').forEach(resizer => {
            resizer.addEventListener('mousedown', function (e) {
                e.preventDefault();
                const top = document.getElementById(resizer.dataset.top);
                const bottom = document.getElementById(resizer.dataset.bottom);
                const startY = e.clientY;
                const startTopHeight = top.offsetHeight;
                const startBottomHeight = bottom.offsetHeight;
                disableIframes();

                function onMouseMove(e) {
                    const dy = e.clientY - startY;
                    let newTopHeight = startTopHeight + dy;
                    let newBottomHeight = startBottomHeight - dy;
                    if (newTopHeight < 30 || newBottomHeight < 30) return;
                    top.style.height = newTopHeight + 'px';
                    bottom.style.height = newBottomHeight + 'px';
                }

                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    enableIframes();
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        });
    </script>
</body>

</html>
