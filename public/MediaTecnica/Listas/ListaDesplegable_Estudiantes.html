<html>
<head>
    <title>Base De Datos De La Instittucion Educativa Kennedy</title>
</head>

    <center>
<body>
<h1>Base De Datos De Estudiantes</h1>

<p>Esta es la base de datos de la I.E.Kennedy utilizada para administrar
    Las notas y faltas de los estudiantes para que los padres esten al dia
    con su proceso academico
</p>

    <!-- LISTA DESPLEGABLE DE ESTUDIANTES -->
    <label for="Estudiantes">Seleccionar Un Estudiate:</label>
    <select name="ESTUDIANTES" id="Estudiantes">
        <option value="Sofia"> Sofia </option>
        <option value="Santiago"> Santiago </option>
        <option value="Helena"> Helena </option>
        <option value="Mariana"> Mariana </option>
        <option value="Valentina"> Valentina </option>
        <option value="Melisa"> Melisa </option>
    </select>

    <!-- Campo de texto multilineal -->
    <label for="Comentarios"> Comentarios: </label>
    <br><textarea name="Comentarios" id="Comentarios" cols="30" rows="10" 
    spellcheck="false" placeholder="escribe aqui tu comentario...">
    </textarea></br>

    <!-- LISTA DESPLEGABLE DE MATERIAS -->
    <label for="Materias">Seleccionar Una Materia:</label>
    <select name="MATERIAS" id="Materias">
        <option value="Sociales"> Sociales </option>
        <option value="Español"> Español </option>
        <option value="Ética"> Ética </option>
        <option value="Matemáticas"> Matemáticas </option>
        <option value="Media Técnica"> Media Técnica </option>
        <option value="Tecnología"> Tecnología </option>
    </select>

    <!-- Campo de texto multilineal -->
    <label for="Comentarios"> Comentarios: </label>
    <br><textarea name="Comentarios" id="Comentarios" cols="30" rows="10" 
    spellcheck="false" placeholder="escribe aqui tu comentario...">
    </textarea></br>

</body>

    </center>
</html>
