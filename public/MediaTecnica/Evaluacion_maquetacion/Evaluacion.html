<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title> Evaluacion de Maquetacion</title>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 750px; height: 700px; margin: auto; background-color: pink; }
        header { width: 750px; height: 200px; background-color: yellow; }
        nav { width: 750px; height: 30px; background-color: blue; }
        main { width: 750px; height: 440px;  background-color: green;  }
        footer { width: 750px; height: 30px; background-color: orange; }
        section#Logo { width: 250px; height: 200px; float: left; background-color: grey; }
        section#Banner { width: 500px; height: 200px; float: left; background-color: red; }
        aside#Left { width: 375px; height: 440px; float: left; background-color: purple; }
        aside#right { width: 375px; height: 440px; float: left; background-color: lightblue }
    </style>
</head>
<body>
    <header>
        <section id="Logo"></section>
        <section id="Banner"></section>
    </header>
    <nav></nav>
    <main class="group">
        <aside id="Left"></aside>
        <aside id="right"></aside>
    </main>
    <footer></footer>
</body>
</html>
