<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MAQUETACION 2</title>
<style>
* { margin: 0; padding: 0; }
html { background-color: #ff6f61; }
body { width: 1000px; height: 800px; margin: auto; background-color: #61ff89; }
header { width: 1000px; height: 200px; background-color: #61aaff; }
nav { width: 1000px; height: 50px; background-color: #ff61f6; }
main { width: 1000px; background-color: #ffdd61; }
section#Logo { width: 200px; height: 200px; float: left; background-color: #61dfff; }
section#Banner { width: 800px; height: 200px; float: left; background-color: #ffa261; }
article { width: 700px; height: 500px; float: left; background-color: #d4ff61; }
aside { width: 300px; height: 500px; float: left; background-color: #ff6197; }
footer { width: 1000px; height: 50px; background-color: #61ffa2; clear: both; }
</style>
</head>
<body>
<header>
<section id="Logo"></section>
<section id="Banner"></section>
</header>
<nav></nav>
<main>
<article></article>
<aside></aside>
</main>
<footer></footer>
</body>
</html>
