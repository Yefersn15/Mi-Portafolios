<!DOCTYPE html>
<head>
<meta charset="utf-8">
<title> MAQUETACION 1 </title>
<style>
* { margin: 0; padding: 0; }
html { background-color: black; }
body { width: 750px; height: 750px; margin: auto; background-color: pink; }
header { width: 750px; height: 250px; background-color: yellow; }
nav { width: 750px; height: 50px; background-color: blue; }
main { width: 750px; height: 400px; background-color: green; }
footer { width: 750px; height: 50px; background-color: orange; }
section#Banner { width: 500px; height: 250px; float: left; background-color: red; }
section#Logo { width: 250px; height: 125px; float: left; background-color: grey; }
section#Login { width: 250px; height: 125px; float: left; background-color: magenta; }
aside#Left { width: 150px; height: 400px; float: left; background-color: purple; }
article { width: 500px; height: 400px; float: left; background-color: lightblue; }
aside#Right { width: 100px; height: 400px; float: left; background-color: red; }
</style>
</head>
<body>
<header>
<section id="Banner"></section>
<section id="Logo"></section>
<section id="Login"></section>
</header>
<nav></nav>
<main>
<aside id="Left"></aside>
<article></article>
<aside id="Right"></aside>
</main>
<footer></footer>
</body>
</html>
