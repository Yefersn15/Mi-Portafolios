<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MAQUETACION 2</title>
<style>
* { margin: 0; padding: 0; }
html { background-color: black; }
body { width: 1000px; height: 800px; margin: auto; background-color: pink; }
header { width: 1000px; height: 200px; background-color: yellow; }
nav { width: 1000px; height: 50px; background-color: blue; }
main { width: 1000px; background-color: green; }
section#Logo { width: 200px; height: 200px; float: left; background-color: grey; }
section#Banner { width: 800px; height: 200px; float: left; background-color: red; }
article { width: 700px; height: 500px; float: left; background-color: lightblue; }
aside { width: 300px; height: 500px; float: left; background-color: red; }
footer { width: 1000px; height: 50px; background-color: orange; clear: both; }
</style>
</head>
<body>
<header>
<section id="Logo"></section>
<section id="Banner"></section>
</header>
<nav></nav>
<main>
<article></article>
<aside></aside>
</main>
<footer></footer>
</body>
</html>
