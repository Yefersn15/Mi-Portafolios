<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: lightblue;
        }

        header {
            background-color: #3377FF;
            color: white;
            text-align: center;
            padding: 10px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            width: 100%;
        }

        main {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            margin-top: 150px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="email"],
        input[type="password"] {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
        }

        button[type="submit"] {
            background-color: #3377FF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        footer {
            background-color: #3377FF;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <header>
        <h1>Cambiar Contraseña</h1>
    </header>

    <main>
        <form id="cambiarContrasenaForm" onsubmit="return cambiarContrasena()">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="nuevaContrasena">Nueva Contraseña:</label>
            <input type="password" id="nuevaContrasena" name="nuevaContrasena" required>

            <label for="confirmarContrasena">Confirmar Nueva Contraseña:</label>
            <input type="password" id="confirmarContrasena" name="confirmarContrasena" required>

            <button type="submit">Cambiar Contraseña</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2024 Institución Educativa Kennedy. Todos los derechos reservados.</p>
    </footer>

    <script>
        function cambiarContrasena() {
            var nuevaContrasena = document.getElementById('nuevaContrasena').value;
            var confirmarContrasena = document.getElementById('confirmarContrasena').value;

            if (nuevaContrasena !== confirmarContrasena) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Las contraseñas no coinciden.' });
                return false;
            }

            // Simular actualización en localStorage (buscando por email)
            var email = document.getElementById('email').value;
            var usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            var usuario = usuarios.find(u => u.Email === email);
            if (!usuario) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'No se encontró un usuario con ese email.' });
                return false;
            }
            usuario.Password = nuevaContrasena;
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            Swal.fire({ icon: 'success', title: 'Éxito', text: 'La contraseña ha sido cambiada exitosamente.' });
            return false;
        }
    </script>
</body>

</html>
