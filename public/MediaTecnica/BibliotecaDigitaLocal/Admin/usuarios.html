<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Mismo estilo que dashboard */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        nav ul li {
            margin-right: 15px;
            position: relative;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            padding: 10px;
            display: block;
        }

        nav ul li a:hover {
            background-color: #555;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #333;
            min-width: 160px;
            z-index: 1;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: #fff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #555;
        }

        .sidebar {
            background-color: #222;
            min-height: 100vh;
            padding: 20px;
            color: #ccc;
        }

        .sidebar a {
            color: #ccc;
            display: block;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 5px;
            text-decoration: none;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #3377FF;
            color: #fff;
        }

        .sidebar a i {
            margin-right: 10px;
            width: 20px;
        }

        .main-content {
            padding: 20px;
            background-color: #f0f0f0;
        }

        .contenedor {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 20px;
        }

        .input__text {
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
        }

        .btn {
            padding: 8px 16px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn__nuevo {
            background-color: #007bff;
        }

        .btn__update {
            background-color: #ffc107;
            color: #000;
        }

        .btn__delete {
            background-color: #dc3545;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        footer {
            background-color: #3377FF;
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            clear: both;
        }

        .social-icons {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .social-icons li {
            margin: 0 10px;
        }

        .social-icons li img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h1><i class="fas fa-cube"></i> Biblioteca Admin</h1>
        <nav>
            <ul>
                <li class="dropdown">
                    <a href="#">Menú &#9776;</a>
                    <div class="dropdown-content">
                        <a href="../index.html">Inicio</a>
                        <a href="../mostrar_libros.html">Ver Biblioteca</a>
                        <a href="dashboard.html">Dashboard</a>
                        <a href="../perfil.html">Mi perfil</a>
                        <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-block">
                <h6 class="text-uppercase text-muted mb-3">Menú Admin</h6>
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="libros.html"><i class="fas fa-book"></i> Libros</a>
                <a href="autores.html"><i class="fas fa-user-edit"></i> Autores</a>
                <a href="categorias.html"><i class="fas fa-tags"></i> Categorías</a>
                <a href="editoriales.html"><i class="fas fa-building"></i> Editoriales</a>
                <a href="prestamos.html"><i class="fas fa-hand-holding-heart"></i> Préstamos</a>
                <a href="devoluciones.html"><i class="fas fa-undo-alt"></i> Devoluciones</a>
                <a href="usuarios.html" class="active"><i class="fas fa-users"></i> Usuarios</a>
                <hr class="bg-secondary">
                <a href="../mostrar_libros.html"><i class="fas fa-eye"></i> Ver Biblioteca</a>
            </div>

            <div class="col-md-10 main-content">
                <div class="contenedor">
                    <h1>Gestión de Usuarios</h1>
                    <form class="formulario" method="post" onsubmit="return buscarUsuario()">
                        <input type="text" name="buscar" id="buscar" placeholder="Buscar por nombre, email, ID..."
                            class="input__text">
                        <input type="submit" class="btn" value="Buscar">
                        <a href="dashboard.html" class="btn btn__nuevo">Volver</a>
                    </form>
                    <div id="tablaUsuarios"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Institución Educativa Kennedy — Panel de Administración</p>
        <ul class="social-icons">
            <li><a href="#"><img src="../img/Facebook.png" alt="Facebook"></a></li>
            <li><a href="#"><img src="../img/twitter.png" alt="Twitter"></a></li>
            <li><a href="#"><img src="../img/YouTube.png" alt="Youtube"></a></li>
        </ul>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        const usuarioActual = JSON.parse(sessionStorage.getItem('usuario_actual'));
        if (!usuarioActual) { window.location.href = '../index.html'; }
        if (usuarioActual.tipo !== 'Bibliotecario/ria' && usuarioActual.tipo !== 'Directivo') {
            Swal.fire({ icon: 'error', title: 'Acceso denegado' }).then(() => { window.location.href = '../mostrar_libros.html'; });
        }

        function cerrarSesion() { sessionStorage.removeItem('usuario_actual'); window.location.href = '../index.html'; }

        function cargarUsuarios(filtro = '') {
            let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
            if (filtro) {
                filtro = filtro.toLowerCase();
                usuarios = usuarios.filter(u =>
                    u.Nombres.toLowerCase().includes(filtro) ||
                    u.Apellidos.toLowerCase().includes(filtro) ||
                    u.Email.toLowerCase().includes(filtro) ||
                    u.Id.toString().includes(filtro)
                );
            }
            let html = `<table><tr><th>ID</th><th>Nombres</th><th>Apellidos</th><th>Género</th><th>Grado</th><th>Email</th><th>Celular</th><th>Tipo</th><th>Acciones</th></tr>`;
            if (usuarios.length === 0) html += `<tr><td colspan="9" class="text-center">No hay usuarios</td></tr>`;
            else {
                usuarios.forEach(u => {
                    html += `<tr>
                    <td>${u.Id}</td>
                    <td>${u.Nombres}</td>
                    <td>${u.Apellidos}</td>
                    <td>${u.Genero}</td>
                    <td>${u.Grado || ''}</td>
                    <td>${u.Email}</td>
                    <td>${u.Celular}</td>
                    <td>${u.tipo}</td>
                    <td>
                        <a href="#" class="btn__update" onclick="editarUsuario('${u.Id}')">Editar</a>
                        <a href="#" class="btn__delete" onclick="eliminarUsuario('${u.Id}')">Eliminar</a>
                    </td>
                </tr>`;
                });
            }
            html += '</table>';
            document.getElementById('tablaUsuarios').innerHTML = html;
        }

        function buscarUsuario() { const f = document.getElementById('buscar').value.trim(); cargarUsuarios(f); return false; }

        function editarUsuario(id) {
            let usuarios = JSON.parse(localStorage.getItem('usuarios'));
            const u = usuarios.find(usr => usr.Id === id);
            if (!u) return;
            Swal.fire({
                title: 'Editar Usuario',
                html: `
                <input id="edit_nombres" class="swal2-input" value="${u.Nombres}" placeholder="Nombres">
                <input id="edit_apellidos" class="swal2-input" value="${u.Apellidos}" placeholder="Apellidos">
                <select id="edit_genero" class="swal2-input">
                    <option value="Masculino" ${u.Genero === 'Masculino' ? 'selected' : ''}>Masculino</option>
                    <option value="Femenino" ${u.Genero === 'Femenino' ? 'selected' : ''}>Femenino</option>
                    <option value="Otro" ${u.Genero === 'Otro' ? 'selected' : ''}>Otro</option>
                </select>
                <input id="edit_grado" class="swal2-input" value="${u.Grado || ''}" placeholder="Grado">
                <input id="edit_email" class="swal2-input" value="${u.Email}" placeholder="Email">
                <input id="edit_celular" class="swal2-input" value="${u.Celular}" placeholder="Celular">
                <select id="edit_tipo" class="swal2-input">
                    <option value="Estudiante" ${u.tipo === 'Estudiante' ? 'selected' : ''}>Estudiante</option>
                    <option value="Profesor/a" ${u.tipo === 'Profesor/a' ? 'selected' : ''}>Profesor/a</option>
                    <option value="Bibliotecario/ria" ${u.tipo === 'Bibliotecario/ria' ? 'selected' : ''}>Bibliotecario/ria</option>
                    <option value="Personal" ${u.tipo === 'Personal' ? 'selected' : ''}>Personal</option>
                    <option value="Directivo" ${u.tipo === 'Directivo' ? 'selected' : ''}>Directivo</option>
                </select>
                <input id="edit_foto" class="swal2-input" value="${u.Foto || ''}" placeholder="Foto (URL)">
            `,
                showCancelButton: true,
                confirmButtonText: 'Actualizar',
                preConfirm: () => {
                    const nombres = document.getElementById('edit_nombres').value;
                    const apellidos = document.getElementById('edit_apellidos').value;
                    const genero = document.getElementById('edit_genero').value;
                    const grado = document.getElementById('edit_grado').value;
                    const email = document.getElementById('edit_email').value;
                    const celular = document.getElementById('edit_celular').value;
                    const tipo = document.getElementById('edit_tipo').value;
                    const foto = document.getElementById('edit_foto').value;
                    if (!nombres || !apellidos || !email || !celular) {
                        Swal.showValidationMessage('Nombres, Apellidos, Email y Celular son obligatorios.');
                        return false;
                    }
                    return { Nombres: nombres, Apellidos: apellidos, Genero: genero, Grado: grado, Email: email, Celular: celular, tipo: tipo, Foto: foto };
                }
            }).then(result => {
                if (result.isConfirmed) {
                    const idx = usuarios.findIndex(usr => usr.Id === id);
                    if (idx !== -1) {
                        usuarios[idx].Nombres = result.value.Nombres;
                        usuarios[idx].Apellidos = result.value.Apellidos;
                        usuarios[idx].Genero = result.value.Genero;
                        usuarios[idx].Grado = result.value.Grado;
                        usuarios[idx].Email = result.value.Email;
                        usuarios[idx].Celular = result.value.Celular;
                        usuarios[idx].tipo = result.value.tipo;
                        usuarios[idx].Foto = result.value.Foto;
                        localStorage.setItem('usuarios', JSON.stringify(usuarios));
                        cargarUsuarios();
                        Swal.fire('Actualizado', 'Usuario actualizado.', 'success');
                    }
                }
            });
        }

        function eliminarUsuario(id) {
            Swal.fire({
                title: '¿Eliminar?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Eliminar',
                cancelButtonText: 'Cancelar'
            }).then(result => {
                if (result.isConfirmed) {
                    let usuarios = JSON.parse(localStorage.getItem('usuarios'));
                    usuarios = usuarios.filter(u => u.Id !== id);
                    localStorage.setItem('usuarios', JSON.stringify(usuarios));
                    cargarUsuarios();
                    Swal.fire('Eliminado', 'Usuario eliminado.', 'success');
                }
            });
        }

        cargarUsuarios();
    </script>
</body>

</html>
