<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías - Biblioteca</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        nav ul li {
            margin-right: 15px;
            position: relative;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            padding: 10px;
            display: block;
        }

        nav ul li:hover {
            background-color: #555;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #333;
            min-width: 160px;
            z-index: 1;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: #fff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #555;
        }

        .search-container {
            margin: 20px;
            text-align: center;
        }

        .search-container input[type="text"] {
            width: 60%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .search-container button {
            padding: 10px 15px;
            border: none;
            background-color: #333;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
        }

        .search-container button:hover {
            background-color: #444;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card-item {
            width: 220px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .card-item i {
            color: #3377FF;
            margin-bottom: 10px;
        }

        .card-item h3 {
            font-size: 1.1rem;
            margin: 10px 0 5px;
        }

        .card-item p {
            font-size: 0.9rem;
            color: #666;
            margin: 0;
        }

        .badge-estado {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .badge-activa {
            background: #d4edda;
            color: #155724;
        }

        .badge-inactiva {
            background: #f8d7da;
            color: #721c24;
        }

        footer {
            background-color: #3377FF;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
            clear: both;
        }

        .social-icons {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .social-icons li {
            margin: 0 10px;
        }

        .social-icons li img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Categorías de la Biblioteca</h1>
        <nav>
            <ul>
                <li class="dropdown">
                    <a href="#">Menú &#9776;</a>
                    <div class="dropdown-content">
                        <a href="index.html">Inicio</a>
                        <a href="mostrar_libros.html">Libros</a>
                        <a href="mostrar_categorias.html">Categorías</a>
                        <a href="mostrar_autores.html">Autores</a>
                        <a href="perfil.html">Mi cuenta</a>
                        <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar categorías...">
        <button onclick="buscarCategorias()">Buscar</button>
    </div>

    <div id="categoriasGallery" class="gallery"></div>

    <footer>
        <p>&copy; 2024 Institución Educativa Kennedy. Todos los derechos reservados.</p>
        <ul class="social-icons">
            <li><a href="#"><img src="img/Facebook.png" alt="Facebook"></a></li>
            <li><a href="#"><img src="img/twitter.png" alt="Twitter"></a></li>
            <li><a href="#"><img src="img/YouTube.png" alt="Youtube"></a></li>
        </ul>
    </footer>

    <script>
        const usuarioActual = JSON.parse(sessionStorage.getItem('usuario_actual'));
        if (!usuarioActual) {
            window.location.href = 'index.html';
        }

        let categorias = [];

        function cargarCategorias(filtro = '') {
            const raw = JSON.parse(localStorage.getItem('categorias')) || [];
            let lista = raw.filter(c => c.activa !== false);

            if (filtro) {
                const q = filtro.toLowerCase();
                lista = lista.filter(c => c.nombre.toLowerCase().includes(q) || (c.descripcion || '').toLowerCase().includes(q));
            }

            lista.sort((a, b) => a.nombre.localeCompare(b.nombre));
            categorias = lista;
            renderizarCategorias();
        }

        function renderizarCategorias() {
            const gallery = document.getElementById('categoriasGallery');
            gallery.innerHTML = '';
            if (categorias.length === 0) {
                gallery.innerHTML = '<p style="text-align:center;width:100%;">No hay categorías disponibles.</p>';
                return;
            }
            categorias.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card-item';
                div.innerHTML = `
                    <i class="fas fa-tags fa-3x"></i>
                    <h3>${c.nombre}</h3>
                    <p>${c.descripcion || 'Sin descripción'}</p>
                    <span class="badge-estado ${c.activa ? 'badge-activa' : 'badge-inactiva'}">${c.activa ? 'Activa' : 'Inactiva'}</span>
                `;
                div.onclick = () => {
                    window.location.href = `libros_por_categoria.html?id=${c.id}`;
                };
                gallery.appendChild(div);
            });
        }

        function buscarCategorias() {
            const q = document.getElementById('searchInput').value.trim();
            cargarCategorias(q);
        }

        function cerrarSesion() {
            sessionStorage.removeItem('usuario_actual');
            window.location.href = 'index.html';
        }

        cargarCategorias();
    </script>

</body>

</html>
