<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autores - Biblioteca</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        nav ul li {
            margin-right: 15px;
            position: relative;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            padding: 10px;
            display: block;
        }

        nav ul li:hover {
            background-color: #555;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #333;
            min-width: 160px;
            z-index: 1;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: #fff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #555;
        }

        .search-container {
            margin: 20px;
            text-align: center;
        }

        .search-container input[type="text"] {
            width: 60%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .search-container button {
            padding: 10px 15px;
            border: none;
            background-color: #333;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
        }

        .search-container button:hover {
            background-color: #444;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card-item {
            width: 220px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .card-item img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .card-item h3 {
            font-size: 1.1rem;
            margin: 10px 0 5px;
        }

        .card-item p {
            font-size: 0.9rem;
            color: #666;
            margin: 2px 0;
        }

        .descripcion {
            font-size: 0.85rem;
            color: #333;
            margin-top: 5px;
        }

        footer {
            background-color: #3377FF;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
            clear: both;
        }

        .social-icons {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .social-icons li {
            margin: 0 10px;
        }

        .social-icons li img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Autores de Nuestra Biblioteca</h1>
        <nav>
            <ul>
                <li class="dropdown">
                    <a href="#">Menú &#9776;</a>
                    <div class="dropdown-content">
                        <a href="index.html">Inicio</a>
                        <a href="mostrar_libros.html">Libros</a>
                        <a href="mostrar_categorias.html">Categorías</a>
                        <a href="mostrar_autores.html">Autores</a>
                        <a href="perfil.html">Mi cuenta</a>
                        <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar autores...">
        <button onclick="buscarAutores()">Buscar</button>
    </div>

    <div id="autoresGallery" class="gallery"></div>

    <footer>
        <p>&copy; 2024 Institución Educativa Kennedy. Todos los derechos reservados.</p>
        <ul class="social-icons">
            <li><a href="#"><img src="img/Facebook.png" alt="Facebook"></a></li>
            <li><a href="#"><img src="img/twitter.png" alt="Twitter"></a></li>
            <li><a href="#"><img src="img/YouTube.png" alt="Youtube"></a></li>
        </ul>
    </footer>

    <script>
        const usuarioActual = JSON.parse(sessionStorage.getItem('usuario_actual'));
        if (!usuarioActual) {
            window.location.href = 'index.html';
        }

        let autores = [];

        function normalizarAutores() {
            const raw = JSON.parse(localStorage.getItem('autores')) || [];
            const autoresNormalizados = raw.map(a => ({
                id_autor: Number(a.id_autor ?? a.id ?? a.idAutor ?? 0),
                nombre: a.nombre ?? a.nombre_autor ?? a.Nombre ?? a.name ?? a.autor ?? '',
                descripcion: a.descripcion ?? a.descripcion_autor ?? a.Descripcion ?? a.description ?? '',
                foto: a.foto ?? a.imagen ?? a.foto_autor ?? a.image ?? a.img ?? ''
            })).filter(a => a.id_autor || a.nombre);
            localStorage.setItem('autores', JSON.stringify(autoresNormalizados));
            return autoresNormalizados;
        }

        function cargarAutores(filtro = '') {
            let lista = normalizarAutores();

            if (filtro) {
                const q = filtro.toLowerCase();
                lista = lista.filter(a =>
                    a.nombre.toLowerCase().includes(q) ||
                    (a.descripcion || '').toLowerCase().includes(q)
                );
            }

            lista.sort((a, b) => a.nombre.localeCompare(b.nombre));
            autores = lista;
            renderizarAutores();
        }

        function renderizarAutores() {
            const gallery = document.getElementById('autoresGallery');
            gallery.innerHTML = '';
            if (autores.length === 0) {
                gallery.innerHTML = '<p style="text-align:center;width:100%;">No hay autores disponibles.</p>';
                return;
            }
            autores.forEach(a => {
                const div = document.createElement('div');
                div.className = 'card-item';
                const fotoHtml = a.foto ? `<img src="${a.foto}" alt="${a.nombre}">` : `<i class="fas fa-user-circle fa-5x" style="color:#3377FF;"></i>`;
                div.innerHTML = `
                    ${fotoHtml}
                    <h3>${a.nombre}</h3>
                    <p class="descripcion">${a.descripcion || 'Sin descripción'}</p>
                `;
                div.onclick = () => {
                    window.location.href = `libros_por_autor.html?autor=${encodeURIComponent(a.nombre)}`;
                };
                gallery.appendChild(div);
            });
        }

        function buscarAutores() {
            const q = document.getElementById('searchInput').value.trim();
            cargarAutores(q);
        }

        function cerrarSesion() {
            sessionStorage.removeItem('usuario_actual');
            window.location.href = 'index.html';
        }

        cargarAutores();
    </script>

</body>

</html>
